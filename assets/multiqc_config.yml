title: Exome Sequencing
subtitle: Institute for Pathology, University clinics Düsseldorf
report_comment: >-
  This report has been generated by the <a
  href="https://github.com/core-unit-bioinformatics/exomeqc/releases/tag/1.0.0"
  target="_blank">core-unit-bioinformatics/exomeqc</a> analysis pipeline.
custom_data:
  exomeqc_cnv_metrics:
    section_name: CNV QC Metrics
    description: >-
      CNV metrics and QC status generated by analyze_cnv_metrics.R. Table colors
      and ranges are configured in this MultiQC file.
    plot_type: table
    pconfig:
      id: exomeqc_cnv_metrics_table
      title: CNV QC Metrics
      col1_header: Sample
      sort_rows: true
  exomeqc_purcov_maxmodel:
    section_name: 'CNV: Purity/Coverage Model'
    description: >-
      Maximum normalized log-likelihood by purity across all samples. For each
      sample, the maximum value is shifted to 0.
    plot_type: linegraph
    pconfig:
      id: exomeqc_purcov_line_all_samples
      title: 'ExomeQC: Purity model (all samples, normalized)'
      xlab: Purity
      ylab: logL - sample max(logL)
      xmin: 0
      xmax: 1
      tt_label: '{point.x:.3f}: {point.y:.3f}'
report_section_order:
  grz_qc:
    order: 1000
  grz_qc_redundant:
    order: 990
  bclconvert:
    order: 980
  interop:
    order: 970
  picard:
    order: 960
  DRAGEN:
    order: 950
  dragen-fastqc:
    order: 940
  fastq_screen:
    order: 930
  fastqc:
    order: 920
  fastp:
    order: 910
  bcftools:
    order: 900
  vep:
    order: 890
  exomeqc_cnv_metrics:
    order: 880
  exomeqc_purcov_maxmodel:
    order: 870
  cio-abcd-variantinterpretation-methods-description:
    order: 60
  cio-abcd-variantinterpretation-summary:
    order: 50
  BfArM-MVH-GRZ_QC_Workflow-summary:
    order: 40
  software_versions:
    order: 30
  core-unit-bioinformatics-exomeqc-methods-description:
    order: 20
  core-unit-bioinformatics-exomeqc-summary:
    order: 10
export_plots: true
extra_fn_clean_trim:
  - .hard-filtered
  - .mapping_metrics
  - .ploidy_estimation_metrics
  - .vc_metrics
  - .cnv-noLOH.vcf.gz
  - .nonredundant
  - .nonredundant.mosdepth.summary.txt
  - .redundant
  - .redundant.mosdepth.summary.txt
ignore_images: false
fn_ignore_dirs:
  - .nextflow
  - .nextflow*
sp:
  exomeqc_cnv_metrics:
    fn: '*cnv-metrics.csv'
  exomeqc_purcov_maxmodel:
    fn: '*purcov_maxmodel_lineplot.json'
disable_version_detection: true